      - data:
          context:
            enabled: false
            variable_selector: []
          desc: Analisis mendalam KPI underperform
          model:
            completion_params:
              max_tokens: 4096
              temperature: 0.4
              top_p: 0.9
            mode: chat
            name: qwen-max
            provider: langgenius/tongyi/tongyi
          prompt_template:
            - id: 977ad7ca-7b7e-4d43-9d3b-bad97b8f6f1c
              role: system
              text: "Anda adalah seorang \"Chief Performance Officer\" dan Analis Strategi Perusahaan yang tajam.\nTugas Anda adalah membedah laporan pencapaian KPI (Key Performance Indicator) dari departemen spesifik.\n\nInstruksi Analisis:\n1. Temukan KPI yang berada di bawah target (underperform).\n2. Jangan hanya membaca angka; berikan opini analitis MENGAPA target tersebut bisa meleset.\n3. WAJIB mengkorelasikan pencapaian yang meleset ini dengan \"Data Makro Ekonomi\" (seperti pelemahan Kurs, inflasi, atau harga komoditas) jika dirasa ada kolerasinya secara logika bisnis.\n4. Tulis laporan dengan gaya naratif formal, profesional, dan berbasis data.\n5. Gunakan format Markdown (Bullet points & Bold) agar mudah dibaca."
            - id: 745e8ee9-a96a-4b03-83e6-d8adfc757b23
              role: user
              text: "Tolong buatkan analisis performa mendalam untuk departemen dan periode berikut:\n\nDepartemen: {{#start.dept_name#}}\nPeriode: {{#start.period#}}\n\n[DATA PENCAPAIAN KPI]:\n{{#start.kpi_data#}}\n\n[DATA MAKRO EKONOMI & PASAR]:\n{{#start.external_data#}}\n\nKonteks Tambahan Knowledge Base:\n{{#knowledge.result#}}\n\nBerikan hasil Analisis Anda secara komprehensif sekarang."
          selected: true
          title: LLM Analyze
          type: llm
          vision:
            enabled: false
        height: 115
        id: llm_analyze
        position:
          x: 1046
          y: 0
        positionAbsolute:
          x: 1046
          y: 0
        selected: true
        type: custom
        width: 242
      - data:
          context:
            enabled: false
            variable_selector: []
          desc: Executive summary ringkas untuk Direksi
          model:
            completion_params:
              max_tokens: 2048
              temperature: 0.3
              top_p: 0.9
            mode: chat
            name: qwen-max
            provider: langgenius/tongyi/tongyi
          prompt_template:
            - id: bfc9d5b4-eb16-4b66-865f-143f8af8373f
              role: system
              text: "Anda adalah \"Executive Assistant\" untuk Jajaran Eksekutif/Direksi (BOD).\nTugas Anda adalah merangkum ribuan baris data dan metrik menjadi satu \"Executive Summary\" yang sangat padat dan langsung pada intinya (to the point).\n\nInstruksi Ringkasan:\n1. Awali dengan satu paragraf kesimpulan utama mengenai status kesehatan departemen tersebut bulan ini.\n2. Highlight 1-2 pencapaian paling cemerlang (Top Performers).\n3. Highlight 1-2 kegagalan paling kritis (Critical Misses).\n4. Sebutkan secara singkat jika ada \"Faktor Eksternal/Makro\" yang mengganggu bulan ini.\n5. Panjang maksimal: 3 atau 4 paragraf pendek.\n6. Nada bicara: Lugas, objektif, tanpa basa-basi."
            - id: 40d818bb-6c56-4fbd-b357-7b9e30541739
              role: user
              text: "Buatkan Executive Summary singkat untuk disajikan kepada Direksi.\n\nDepartemen: {{#start.dept_name#}}\nPeriode: {{#start.period#}}\n\nData Pencapaian:\n{{#start.kpi_data#}}\n\nKondisi Pasar Bulan ini:\n{{#start.external_data#}}\n\nKonteks Knowledge Base:\n{{#knowledge.result#}}\n\nTuliskan Ringkasan Eksekutif-nya."
          selected: false
          title: LLM Summarize
          type: llm
          vision:
            enabled: false
        height: 131
        id: llm_summarize
        position:
          x: 1046
          y: 195
        positionAbsolute:
          x: 1046
          y: 195
        selected: false
        type: custom
        width: 242
      - data:
          context:
            enabled: false
            variable_selector: []
          desc: Rekomendasi improvement actionable per KPI
          model:
            completion_params:
              max_tokens: 4096
              temperature: 0.5
              top_p: 0.9
            mode: chat
            name: qwen-max
            provider: langgenius/tongyi/tongyi
          prompt_template:
            - role: system
              text: "Anda adalah \"Konsultan Manajemen Operasional\" dari firma konsultan terkemuka (Tier-1).\nFokus Anda bukan melaporkan masa lalu, melainkan merekomendasikan TINDAKAN (Action Plan) ke masa depan.\n\nInstruksi Rekomendasi:\n1. Amati KPI mana saja yang skor / achievement rate-nya paling membahayakan.\n2. Berikan 3 hingga 5 rekomendasi tindakan perbaikan (Actionable Improvements).\n3. Setiap rekomendasi harus bersifat sangat spesifik (bukan sekadar \"Tingkatkan kerjasama tim\").\n4. Bila kebetulan harga bahan baku dunia naik atau kurs IDR sedang hancur menurut \"Data Makro\", sarankan strategi lindung nilai (hedging) atau efisiensi spesifik.\n5. Gunakan format tabel atau poin bernomor yang tegas."
            - role: user
              text: "Sebagai Konsultan, apa yang harus dilakukan manajer departemen ini bulan depan untuk memperbaiki keadaannya?\n\nTim/Departemen: {{#start.dept_name#}}\nBulan Evaluasi: {{#start.period#}}\n\nRapor Data Bulanan:\n{{#start.kpi_data#}}\n\nTekanan/Anomali Makro:\n{{#start.external_data#}}\n\nKonteks Knowledge Base:\n{{#knowledge.result#}}\n\nSusun rencana tindakan (Action Plan) Anda untuk mereka."
          selected: false
          title: LLM Suggest
          type: llm
          vision:
            enabled: false
        height: 131
