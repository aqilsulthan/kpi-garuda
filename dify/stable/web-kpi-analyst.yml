    "Workflow analisis KPI maskapai penerbangan. 3 action: analyze, summarize,
    suggest. Menggunakan Knowledge Base kpi-context dan data eksternal."
  icon: 🤖
  icon_background: "#E0F2FE"
  mode: workflow
  name: web-kpi-analyst
  use_icon_as_answer_icon: false
